    StockFilterItem:
      type: object
      description: 条件选股结果项（对应 Futu get_stock_filter）
      properties:
        code:
          type: string
          description: 股票代码

    SimpleFilter:
      type: object
      description: 简单属性筛选条件（SimpleFilter）
      properties:
        filter_type:
          type: string
          description: 多态类型，必须为 SIMPLE（与 discriminator mapping 一致）
        stock_field:
          $ref: "enum.yaml#/StockField"
        filter_min:
          type: number
          format: decimal
          description: 区间下限（闭区间），不传默认为 -∞
        filter_max:
          type: number
          format: decimal
          description: 区间上限（闭区间），不传默认为 +∞
        eq_value:
          type: string
          description: 等于值，不传默认为空
        is_no_filter:
          type: boolean
          description: 该字段是否不需要筛选（不传默认为不筛选）
        sort:
          $ref: "enum.yaml#/SortDir"
      required:
        - filter_type
        - stock_field

    FinancialFilter:
      type: object
      description: 财务属性筛选条件（FinancialFilter）
      properties:
        filter_type:
          type: string
          description: 多态类型，必须为 FINANCIAL（与 discriminator mapping 一致）
        stock_field:
          $ref: "enum.yaml#/FinancialStockField"
        filter_min:
          type: number
          format: decimal
          description: 区间下限（闭区间），不传默认为 -∞
        filter_max:
          type: number
          format: decimal
          description: 区间上限（闭区间），不传默认为 +∞
        is_no_filter:
          type: boolean
          description: 该字段是否不需要筛选（不传默认为不筛选）
        sort:
          $ref: "enum.yaml#/SortDir"
        quarter:
          $ref: "enum.yaml#/FinancialQuarter"
      required:
        - filter_type
        - stock_field
        - quarter

    PatternFilter:
      type: object
      description: 形态技术指标筛选条件（PatternFilter）
      properties:
        filter_type:
          type: string
          description: 多态类型，必须为 PATTERN（与 discriminator mapping 一致）
        stock_field:
          $ref: "enum.yaml#/PatternStockField"
        ktype:
          $ref: "enum.yaml#/KLType"
        consecutive_period:
          type: integer
          default: 0
          description: 筛选连续周期（consecutive_period）
        is_no_filter:
          type: boolean
          description: 该字段是否不需要筛选（不传默认为不筛选）
      required:
        - filter_type
        - stock_field
        - ktype

    CustomIndicatorFilter:
      type: object
      description: 自定义技术指标筛选条件（CustomIndicatorFilter）
      properties:
        filter_type:
          type: string
          description: 多态类型，必须为 CUSTOM_INDICATOR（与 discriminator mapping 一致）
        stock_field1:
          $ref: "enum.yaml#/CustomStockField"
        stock_field1_para:
          type: array
          description: 自定义指标参数（根据指标类型传参）
          items:
            type: integer
        relative_position:
          $ref: "enum.yaml#/RelativePosition"
        stock_field2:
          $ref: "enum.yaml#/CustomStockField"
        stock_field2_para:
          type: array
          description: 自定义指标参数（根据指标类型传参）
          items:
            type: integer
        value:
          type: number
          format: decimal
          description: 自定义数值（当 stock_field2 选择自定义数值时为必传参数）
        ktype:
          $ref: "enum.yaml#/KLType"
        consecutive_period:
          type: integer
          description: 筛选连续周期（consecutive_period）
        is_no_filter:
          type: boolean
          description: 该字段是否不需要筛选（不传默认为不筛选）
      required:
        - filter_type
        - stock_field1
        - stock_field2
        - relative_position
        - ktype

    StockFilterCondition:
      description: 条件选股筛选条件（多态，依赖 filter_type 反序列化）
      oneOf:
        - $ref: "#/components/schemas/SimpleFilter"
        - $ref: "#/components/schemas/FinancialFilter"
        - $ref: "#/components/schemas/PatternFilter"
        - $ref: "#/components/schemas/CustomIndicatorFilter"
      discriminator:
        propertyName: filter_type
        mapping:
          SIMPLE: "#/components/schemas/SimpleFilter"
          FINANCIAL: "#/components/schemas/FinancialFilter"
          PATTERN: "#/components/schemas/PatternFilter"
          CUSTOM_INDICATOR: "#/components/schemas/CustomIndicatorFilter"

    StockFilterConfig:
      type: object
      description: 条件选股请求体（POST /quote/get_stock_filter）
      properties:
        market:
          $ref: "enum.yaml#/Markets"
