
components:
  schemas:
    AnalysisUSStocks:
      type: object
      description: 美股分析
      properties:
        targetPricePrediction:
          $ref: '#/components/schemas/TargetPricePrediction'
        recommendedByUSStockAnalysts:
          $ref: '#/components/schemas/RecommendedByUSStockAnalysts'

    TargetPricePrediction:
      type: object
      description: 目标价预测
      properties:
        high:
          type: number
          description: 最高目标价
        mean:
          type: number
          description: 平均目标价
        low:
          type: number
          description: 最低目标价
        lastPrice:
          type: number
          description: 最新价
        numOfEstimates:
          type: string
          description: 预测机构数量

    RecommendedByUSStockAnalysts:
      type: object
      description: 美股分析师推荐相关统计
      properties:
        numberOfAnalystsOneWeekAgo:
          type: string
          description: 一周前分析师数量
        averageRating:
          type: string
          description: 平均评级
        averageRatingData:
          type: number
          description: 平均评级数据
        oneWeekAgo:
          $ref: '#/components/schemas/RecommendationsNumResp'
          description: 一周前
        oneMonthAgo:
          $ref: '#/components/schemas/RecommendationsNumResp'
          description: 一月前
        twoMonthAgo:
          $ref: '#/components/schemas/RecommendationsNumResp'
          description: 二月前
        threeMonthAgo:
