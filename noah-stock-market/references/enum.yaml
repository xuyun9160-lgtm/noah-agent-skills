    - AUCTION: 竞价交易
    - BULK: 批量交易
    - CRASH: 现金交易
    - CROSS_MARKET: 跨市场交易
    - BULK_SOLD: 批量卖出
    - FREE_ON_BOARD: 离价交易
    - RULE127_OR155: 第127条交易（纽交所规则）或第155条交易
    - DELAY: 延迟交易
    - MARKET_CENTER_CLOSE_PRICE: 中央收市价
    - NEXT_DAY: 隔日交易
    - MARKET_CENTER_OPENING: 中央开盘价交易
    - PRIOR_REFERENCE_PRICE: 前参考价
    - MARKET_CENTER_OPEN_PRICE: 中央开盘价
    - SELLER: 卖方
    - T: T类交易（盘前和盘后交易）
    - EXTENDED_TRADING_HOURS: 延长交易时段
    - CONTINGENT: 合单交易
    - AVERAGE_PRICE: 平均价成交
    - OTC_SOLD: 场外售出
    - ODD_LOT_CROSS_MARKET: 碎股跨市场交易
    - DERIVATIVELY_PRICED: 衍生工具定价
    - REOPENINGP_RICED: 再开盘定价
    - CLOSING_PRICED: 收盘定价
    - COMPREHENSIVE_DELAY_PRICE: 综合延迟价格
    - OVERSEAS: 交易的一方不是香港交易所的成员，属于场外交易
