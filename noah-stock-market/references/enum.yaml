PatternStockField:
  type: string
  description: |
    形态技术指标属性
    - NONE: 未知
    - MA_ALIGNMENT_LONG: MA多头排列（连续两天MA5>MA10>MA20>MA30>MA60，且当日收盘价大于前一天收盘价）
    - MA_ALIGNMENT_SHORT: MA空头排列（连续两天MA5<MA10<MA20<MA30<MA60，且当日收盘价小于前一天收盘价）
    - EMA_ALIGNMENT_LONG: EMA多头排列（连续两天EMA5>EMA10>EMA20>EMA30>EMA60，且当日收盘价大于前一天收盘价）
    - EMA_ALIGNMENT_SHORT: EMA空头排列（连续两天EMA5<EMA10<EMA20<EMA30<EMA60，且当日收盘价小于前一天收盘价）
    - RSI_GOLD_CROSS_LOW: RSI低位金叉（50以下，短线RSI上穿长线RSI）
    - RSI_DEATH_CROSS_HIGH: RSI高位死叉（50以上，短线RSI下穿长线RSI）
    - RSI_TOP_DIVERGENCE: RSI顶背离
    - RSI_BOTTOM_DIVERGENCE: RSI底背离
    - KDJ_GOLD_CROSS_LOW: KDJ低位金叉
    - KDJ_DEATH_CROSS_HIGH: KDJ高位死叉
    - KDJ_TOP_DIVERGENCE: KDJ顶背离
    - KDJ_BOTTOM_DIVERGENCE: KDJ底背离
    - MACD_GOLD_CROSS_LOW: MACD低位金叉
    - MACD_DEATH_CROSS_HIGH: MACD高位死叉
    - MACD_TOP_DIVERGENCE: MACD顶背离
    - MACD_BOTTOM_DIVERGENCE: MACD底背离
