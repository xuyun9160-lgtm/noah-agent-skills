    逐笔类型枚举
    
    枚举说明：
    - UNKNOWN: 未知
    - AUTO_MATCH: 自动对盘
    - LATE: 开市前成交盘
    - NON_AUTO_MATCH: 非自动对盘
    - INTER_AUTO_MATCH: 同一证券商自动对盘
    - INTER_NON_AUTO_MATCH: 同一证券商非自动对盘
